name: Audit Dependencies

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      audit: ${{ steps.data.outputs.audit }}
      outdated: ${{ steps.data.outputs.outdated }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect dependency data
        id: data
        run: |
          npm audit --json > /tmp/audit.json 2>&1 || true
          npm outdated --json > /tmp/outdated.json 2>&1 || true
          {
            echo 'audit<<AUDIT_EOF'
            cat /tmp/audit.json
            echo 'AUDIT_EOF'
          } >> "$GITHUB_OUTPUT"
          {
            echo 'outdated<<OUTDATED_EOF'
            cat /tmp/outdated.json
            echo 'OUTDATED_EOF'
          } >> "$GITHUB_OUTPUT"

  analyze:
    needs: collect
    if: needs.collect.outputs.audit != '{}' || needs.collect.outputs.outdated != '{}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in autonomous CI mode. Do NOT wait for user validation. Do NOT follow any workflow steps from CLAUDE.md. Just execute the task below and stop.

            Here is the output of `npm audit --json`:
            ```json
            ${{ needs.collect.outputs.audit }}
            ```

            Here is the output of `npm outdated --json`:
            ```json
            ${{ needs.collect.outputs.outdated }}
            ```

            Analyze these results and take action:

            1. If there are minor/patch updates with no breaking changes:
               - Run `npm update` to apply safe updates
               - Verify with `npm test` and `npm run build`
               - If tests pass, create a PR titled "chore: update dependencies (automated audit)"
               - PR body: list each package with old → new version

            2. If there are only major version bumps or vulnerabilities with no auto-fix:
               - Create a GitHub Issue titled "Dependencies: audit findings — $(date +%Y-%m-%d)"
               - List each finding with severity and affected package

            3. If everything is up to date and secure (both outputs are empty `{}`):
               - Do nothing. Do not create empty PRs or issues.
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6
            --allowedTools Bash,Read,Edit,Write,Glob,Grep
