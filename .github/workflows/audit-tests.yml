name: Audit Test Coverage

on:
  schedule:
    - cron: "0 9 * * 2" # Every Tuesday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      test_results: ${{ steps.data.outputs.test_results }}
      src_files: ${{ steps.data.outputs.src_files }}
      test_files: ${{ steps.data.outputs.test_files }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect test data
        id: data
        run: |
          # Run tests and capture summary
          {
            echo 'test_results<<TEST_EOF'
            npm test -- --reporter=verbose 2>&1 | tail -80 || true
            echo 'TEST_EOF'
          } >> "$GITHUB_OUTPUT"

          # List all source modules
          {
            echo 'src_files<<SRC_EOF'
            find src/ -name "*.ts" -not -path "*/\__tests__/*" -not -name "*.d.ts" | sort
            echo 'SRC_EOF'
          } >> "$GITHUB_OUTPUT"

          # List all test files
          {
            echo 'test_files<<TESTF_EOF'
            find src/__tests__/ -name "*.test.ts" 2>/dev/null | sort || echo "No test directory found"
            echo 'TESTF_EOF'
          } >> "$GITHUB_OUTPUT"

  analyze:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            IMPORTANT: You are running in autonomous CI mode. Do NOT wait for user validation. Do NOT follow any workflow steps from CLAUDE.md. Just execute the task below and stop.

            You are auditing the test coverage of a CPS1 arcade emulator project.
            Here is pre-collected data:

            ## Test results (verbose)
            ```
            ${{ needs.collect.outputs.test_results }}
            ```

            ## Source files
            ```
            ${{ needs.collect.outputs.src_files }}
            ```

            ## Test files
            ```
            ${{ needs.collect.outputs.test_files }}
            ```

            Analyze:
            1. Which source modules have NO corresponding test file?
            2. Among those, which are high-risk (CPU, video, memory, audio codecs)?
            3. Are there any test failures?

            Rank untested modules by risk. For each gap, suggest what specific tests would add the most value. Maximum 10 findings.

            If gaps found:
            - Create a GitHub Issue titled "Test coverage gaps — $(date +%Y-%m-%d)"
            - Prioritized list with suggested test descriptions

            If coverage is solid:
            - Do nothing.
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6
            --allowedTools Bash,Read,Glob,Grep
