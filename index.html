<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPS1-Web</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #000;
        color: #fff;
        font-family: "Courier New", Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
        max-width: 800px;
        padding: 16px;
      }

      header {
        text-align: center;
      }

      header h1 {
        font-size: 1.4rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #e8003c;
        text-shadow: 0 0 12px #e8003c88;
      }

      header p {
        font-size: 0.7rem;
        color: #555;
        letter-spacing: 0.15em;
        margin-top: 4px;
      }

      /* Canvas wrapper — CPS1 native 384x224, displayed at 2x */
      #canvas-wrapper {
        position: relative;
        width: 768px;
        height: 448px;
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
      }

      #screen {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
      }

      /* Fullscreen: stretch to fill screen */
      #canvas-wrapper:fullscreen {
        width: 100vw;
        height: 100vh;
        border: none;
      }

      /* Drop zone — overlays canvas when no ROM is loaded */
      #drop-zone {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      #drop-zone.hidden {
        display: none;
      }

      #drop-zone.drag-over {
        background: #e8003c18;
        outline: 2px dashed #e8003c;
        outline-offset: -4px;
      }

      #drop-zone .icon {
        font-size: 3rem;
        line-height: 1;
        filter: drop-shadow(0 0 8px #e8003c66);
      }

      #drop-zone .label {
        font-size: 0.85rem;
        letter-spacing: 0.15em;
        color: #888;
        text-transform: uppercase;
      }

      #drop-zone .sublabel {
        font-size: 0.65rem;
        color: #444;
        letter-spacing: 0.1em;
      }

      #file-input {
        display: none;
      }

      #status {
        font-size: 0.7rem;
        color: #444;
        letter-spacing: 0.1em;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>CPS1-Web</h1>
        <p>Capcom Play System 1 — Browser Emulator</p>
      </header>

      <div id="canvas-wrapper">
        <canvas id="screen" width="384" height="224"></canvas>

        <div id="drop-zone">
          <span class="label" style="font-size:0.65rem;color:#444;letter-spacing:0.1em;">Select a game below</span>
        </div>
      </div>

      <div id="rom-controls" style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;">
        <select id="game-select" style="padding:6px 10px;background:#1a1a1a;color:#e8003c;border:1px solid #333;font-family:inherit;font-size:0.75rem;">
          <option value="">-- Select a CPS1 game --</option>
        </select>
        <button id="load-btn" style="padding:6px 16px;background:#1a1a1a;color:#e8003c;border:1px solid #333;cursor:pointer;font-family:inherit;font-size:0.8rem;letter-spacing:0.1em;" disabled>LOAD</button>
      </div>

      <p id="status">Ready. P=Pause F=Fullscreen Esc=Quit</p>
    </div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
